<!DOCTYPE html>
<html>

<head>

    <title>Attendance Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2>
                Attendance Predictor
            </h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <label>
                    Total Classes
                </label>

                <input
                    type="number"
                    name="total_classes"
                    class="form-control"
                    required>

                <br>

                <label>
                    Present Classes
                </label>

                <input
                    type="number"
                    name="present_classes"
                    class="form-control"
                    required>

                <br>

                <button
                    type="submit"
                    class="btn btn-success">

                    Predict

                </button>

            </form>

        </div>

    </div>

{% if result %}

<hr>

<div class="row text-center">

    <div class="col-md-6">

        <div class="card bg-primary text-white">

            <div class="card-body">

                <h5>Current Attendance</h5>

                <h2>
                    {{ result.attendance_percentage }}%
                </h2>

            </div>

        </div>

    </div>

    <div class="col-md-6">

        <div class="card bg-success text-white">

            <div class="card-body">

                <h5>
                    Classes Needed For 75%
                </h5>

                <h2>
                    {{ result.needed_classes }}
                </h2>

            </div>

        </div>

    </div>

</div>

<div class="mt-4">

    <div class="alert alert-info">

        <h4>
            Attendance Status:
            {{ result.status }}
        </h4>

    </div>

</div>

{% endif %}

</div>

</body>

</html>
