<!DOCTYPE html>
<html>

<head>
    <title>Attendance Report</title>
</head>

<body>

<h2>Attendance Report</h2>

<table border="1">

<tr>
        <th>Name</th>
        <th>Total Classes</th>
        <th>Present</th>
        <th>Percentage</th>
        <th>Status</th>
</tr>

{% for row in report_data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}%</td>

<td>
{% if row[3] < 75 %}
Defaulter
{% else %}
Good
{% endif %}
</td>
</tr>

{% endfor %}

</table>

<br>

<br><br>

<a href="/download_report">
    Download CSV Report
</a>

<br><br>

<br><br>

<a href="/download_excel"
   class="btn btn-success">

   Download Excel Report

</a>

<a href="/">Back Home</a>

</body>
</html>
