<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>

<body>

<h2>Add Student</h2>

<form method="POST">

    <input type="text"
           name="name"
           placeholder="Student Name"
           required>

    <br><br>

    <input type="text"
           name="course"
           placeholder="Course"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Student Email"
           required>

    <br><br>

    <button type="submit">
        Save Student
    </button>

</form>

</body>
</html>
